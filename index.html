<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Site Decathlon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="scroll-container">
      <div class="sticky-container">
        <img
          src="./assets/img/nike.png"
          alt=""
          class="hero-image"
          id="hero-image"
        />

        <canvas id="hero-canvas"></canvas>

        <div class="cloud-mask" id="cloud-mask"></div>

        <div class="hero-overlay" id="hero-overlay">
          <div class="hero-top">
            <img
              src="./assets/img/nike-logo.png"
              alt="Logo"
              class="hero-logo"
            />
          </div>

          <div class="hero-left-content">
            <h1 class="hero-title">
              STEP INTO <br />
              THE <span>FUTURE</span>
            </h1>

            <p class="hero-subtitle">PERFORMANCE REDEFINED</p>

            <button href="#" class="hero-cta">SHOP NOW</button>
          </div>

          <div class="hero-center-copy">
            <p class="discover-text">
              DÉCOUVREZ NOTRE <br />
              NOUVELLE SNEAKER
            </p>

            <div class="scroll-indicator">
              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>

              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>

              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
