<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Site Decathlon</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <section class="scroll-container">
      <div class="sticky-container">
        <img
          src="./assets/img/nike.png"
          alt=""
          class="hero-image"
          id="hero-image"
        />

        <canvas id="hero-canvas"></canvas>

        <div class="cloud-mask" id="cloud-mask"></div>

        <div class="hero-overlay" id="hero-overlay">
          <div class="hero-top">
            <img
              src="./assets/img/nike-logo.png"
              alt="Logo"
              class="hero-logo"
            />
          </div>

          <a href="https://www.nike.com.br/" class="hero-cta" id="buyBtn">
            <span class="hero-cta-bg"></span>
            <span class="hero-cta-text">
              <span>S</span><span>H</span><span>O</span><span>P</span>
              <span>&nbsp;</span>
              <span>N</span><span>O</span><span>W</span>
            </span>
          </a>

          <div class="hero-left-content">
            <h1 class="hero-title">
              STEP INTO <br />
              THE <span>FUTURE</span>
            </h1>

            <p class="hero-subtitle">PERFORMANCE REDEFINED</p>
          </div>

          <div class="hero-center-copy">
            <p class="discover-text">Scroll</p>

            <div class="scroll-indicator">
              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>

              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>

              <svg
                class="chevron"
                xmlns="http://www.w3.org/2000/svg"
                width="19"
                height="14"
                viewBox="0 0 19 14"
                fill="none"
              >
                <path
                  d="M1.5 2L9.5 11L17.5 2"
                  stroke="white"
                  stroke-width="3"
                  stroke-linecap="round"
                />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="taglines-section">
      <div class="taglines-rails">
        <!-- LINHA 1 -->
        <div class="rail rail-right">
          <div class="rail-track">
            <div class="rail-group">
              <div class="rail-item">
                <img src="./assets/img/rail-1.jpeg" alt="" />
              </div>
              <h3 class="rail-title" data-word="air"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-2.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-3.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-4.jpeg" alt="" />
              </div>
            </div>

            <div class="rail-group" aria-hidden="true">
              <div class="rail-item">
                <img src="./assets/img/rail-1.jpeg" alt="" />
              </div>
              <h3 class="rail-title" data-word="air"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-2.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-3.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-4.jpeg" alt="" />
              </div>
            </div>
          </div>
        </div>

        <!-- LINHA 2 -->
        <div class="rail rail-left">
          <div class="rail-track">
            <div class="rail-group">
              <div class="rail-item">

              </div>
              <div class="rail-item">

              </div>
              <h3 class="rail-title" data-word="force"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-7.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-8.jpeg" alt="" />
              </div>
            </div>

            <div class="rail-group" aria-hidden="true">
              <div class="rail-item">
                <img src="./assets/img/rail-5.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-6.jpeg" alt="" />

              <h3 class="rail-title" data-word="force"></h3>
              <div class="rail-item">

            </div>
          </div>
        </div>

        <!-- LINHA 3 -->
        <div class="rail rail-right">
          <div class="rail-track">
            <div class="rail-group">
              <div class="rail-item">
                <img src="./assets/img/rail-9.jpeg" alt="" />
              </div>
              <h3 class="rail-title" data-word="edition"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-10.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-11.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-12.jpeg" alt="" />
              </div>
            </div>

            <div class="rail-group" aria-hidden="true">
              <div class="rail-item">
                <img src="./assets/img/rail-9.jpeg" alt="" />
              </div>
              <h3 class="rail-title" data-word="edition"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-10.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-11.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-12.jpeg" alt="" />
              </div>
            </div>
          </div>
        </div>

        <!-- LINHA 4 -->
        <div class="rail rail-left">
          <div class="rail-track">
            <div class="rail-group">
              <div class="rail-item">
                <img src="./assets/img/rail-13.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-14.jpeg" alt="" />
              </div>
              <h3 class="rail-title" data-word="limited"></h3>
              <div class="rail-item">
                <img src="./assets/img/rail-15.jpeg" alt="" />
              </div>
              <div class="rail-item">
                <img src="./assets/img/rail-16.jpeg" alt="" />
              </div>
            </div>

            <div class="rail-group" aria-hidden="true">
              <div class="rail-item">
                <img src="./assets/img/rail-13.jpeg" alt="" />
              </div>
              <div class="rail-item">

              <div class="rail-item">

              <div class="rail-item">
                <img src="./assets/img/rail-16.jpeg" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="products-section">
      <div class="products-grid">
        <article class="product-card">
          <a href="#" class="product-link">
            <div class="product-number">76</div>
            <img
              src="./assets/img/produto-verde.png"
              alt=""
              class="product-image"
            />
          </a>

          <div class="product-info">
            <p>NIKE AIR FORCE 1</p>
            <p>Green</p>
            <br />
            <p>R$ 699,90</p>
          </div>

          <a href="#" class="product-button" style="--btn-bg: #7e8368">
            <span></span>
            Adicionar ao carrinho
          </a>
        </article>

        <article class="product-card">
          <a href="#" class="product-link">
            <div class="product-number">76</div>
            <img
              src="./assets/img/produto-branco..png"
              alt=""
              class="product-image"
            />
          </a>

          <div class="product-info">
            <p>NIKE AIR FORCE 1</p>
            <p>White</p>
            <br />
            <p>R$ 699,90</p>
          </div>

          <a href="#" class="product-button" style="--btn-bg: #c6bea4">
            <span></span>
            Adicionar ao carrinho
          </a>

        <article class="product-card">
          <a href="#" class="product-link">
            <div class="product-number">76</div>
            <img
              src="./assets/img/teste.webp"
              alt=""
              class="product-image"
            />
          </a>

          <div class="product-info">
            <p>NIKE AIR FORCE 1</p>
            <p>Purple</p>
            <br />
            <p>R$ 699,90</p>
          </div>

          <a href="#" class="product-button" style="--btn-bg: #a092b2">
            <span></span>
            Adicionar ao carrinho
          </a>
        </article>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
